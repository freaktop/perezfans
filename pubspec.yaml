name: perezfans
description: PerezFans — Where Creators Connect, Collaborate, and Cash Out.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  auto_size_text: ^3.0.0
  cached_network_image: ^3.4.1
  chewie: ^1.11.3
  cloud_firestore: ^5.6.9
  collection: ^1.19.1
  cross_file: ^0.3.5+2
  csslib: ^1.0.2
  easy_debounce: ^2.0.1
  file_picker: ^8.0.1
  firebase_auth: ^5.6.0
  firebase_core: ^3.14.0
  firebase_storage: ^12.4.7
  flutter_animate: ^4.5.0
  flutter_cache_manager: ^3.4.1
  flutter_plugin_android_lifecycle: ^2.0.28
  font_awesome_flutter: ^11.0.0
  from_css_color: ^2.0.0
  go_router: ^12.1.3
  google_fonts: ^6.3.3
  google_sign_in: ^6.2.1
  html: ^0.15.6
  image_picker: ^1.1.2
  intl: ^0.20.2
  json_path: ^0.7.2
  mime_type: ^1.0.0
  page_transition: ^2.2.2
  path_provider: ^2.1.4
  plugin_platform_interface: ^2.1.8
  provider: ^6.1.5
  rxdart: ^0.27.7
  share_plus: ^10.0.2
  shared_preferences: ^2.5.3
  sign_in_with_apple: ^7.0.1
  sqflite: ^2.3.3+1
  sqflite_common: ^2.5.4+3
  stop_watch_timer: ^3.0.2
  stream_transform: ^2.1.0
  timeago: ^3.7.1
  url_launcher: ^6.3.1
  video_player: ^2.10.0
  wakelock_plus: ^1.3.2
  cloud_functions: ^5.1.0
  firebase_app_check: ^0.3.2+10
  firebase_messaging: ^15.2.4
  agora_rtc_engine: ^6.5.4
  flutter_dotenv: ^5.2.1
  permission_handler: ^11.3.1

  cupertino_icons: ^1.0.8

dependency_overrides:
  http: ^1.4.0
  uuid: ^4.0.0
  ffi: ^2.1.2
  win32: ^6.3.0

dev_dependencies:
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^4.0.0
  image: ^4.2.0
  lints: ^4.0.0
  flutter_test:
    sdk: flutter


flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  web:
    generate: true
  image_path: 'assets/images/app_launcher_icon.png'

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/images/
    - assets/videos/
    - assets/audios/
    - assets/rive_animations/
    - assets/pdfs/
    - assets/jsons/
    - assets/.env
